name: Publicar ASCEND

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Habilitar Pages si todavía no está configurado
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow || true
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Preparar contenido
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
