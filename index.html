<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050711" />
  <meta name="description" content="ASCEND: entrenamiento, progresión y mazmorras automáticas en una PWA móvil." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <title>ASCEND · Protocolo del Cazador</title>
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <div id="app" class="app-shell" aria-live="polite">
    <header class="topbar">
      <button class="icon-button" id="profileButton" aria-label="Abrir perfil">
        <span id="avatarInitial">S</span>
      </button>
      <div class="topbar-title">
        <span class="eyebrow">PROTOCOLO ACTIVO</span>
        <strong id="topPlayerName">Sergio</strong>
      </div>
      <div class="topbar-meta">
        <span id="topRank" class="rank-chip">RANGO E</span>
        <button class="icon-button subtle" id="soundButton" aria-label="Activar o desactivar sonido">♪</button>
      </div>
    </header>

    <main id="mainContent" class="main-content"></main>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button class="nav-item active" data-view="mission">
        <span class="nav-icon">◇</span><span>Misión</span>
      </button>
      <button class="nav-item" data-view="dungeons">
        <span class="nav-icon">⌁</span><span>Mazmorras</span>
      </button>
      <button class="nav-item" data-view="character">
        <span class="nav-icon">△</span><span>Cazador</span>
      </button>
      <button class="nav-item" data-view="inventory">
        <span class="nav-icon">▣</span><span>Equipo</span>
      </button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <template id="onboardingTemplate">
    <section class="onboarding">
      <div class="system-mark">A</div>
      <p class="eyebrow">SINCRONIZACIÓN INICIAL</p>
      <h1>ASCEND</h1>
      <p class="onboarding-copy">Convierte tu entrenamiento real en una progresión diaria de nivel, atributos, equipo y mazmorras.</p>
      <form id="onboardingForm" class="stack-form">
        <label>Nombre del cazador<input id="onboardingName" maxlength="18" value="Sergio" autocomplete="name" /></label>
        <label>Condición inicial
          <select id="onboardingFitness">
            <option value="beginner">Principiante</option>
            <option value="regular" selected>Entreno ocasionalmente</option>
            <option value="trained">Entreno con frecuencia</option>
          </select>
        </label>
        <label class="check-row"><input type="checkbox" id="safetyCheck" required /><span>Adaptaré los ejercicios a mi situación y pararé si siento dolor, mareo o malestar.</span></label>
        <button class="primary-button" type="submit">INICIAR PROTOCOLO</button>
      </form>
    </section>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
